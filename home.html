<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
</head>
<body>
    <h1>Available Jobs 🚀</h1>

    {% for job in jobs %}
        <h2>{{ job.title }}</h2>
        <p>{{ job.company }} - {{ job.location }}</p>
        <p>Salary: {{ job.salary }}</p>
        <p>{{ job.description }}</p>
        <hr>
    {% endfor %}

</body>
</html>
